services:
  - type: web
    name: skillswap
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 run:app
    envVars:
      - key: SECRET_KEY
        value: skillswap_super_secret_key_2024_live
      - key: PYTHON_VERSION
        value: 3.11.0