{% extends "base.html" %}
{% block title %}Forgot Password - SkillSwap{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="auth-card card border-0">
                    <div class="card-body">
                        <div class="auth-header">
                            <div class="auth-icon" style="background:linear-gradient(135deg, #F59E0B, #EF4444);">
                                <i class="fas fa-key"></i>
                            </div>
                            <h2>Forgot Password?</h2>
                            <p>Enter your email to reset your password</p>
                        </div>

                        <form method="POST" action="{{ url_for('auth.forgot_password') }}">
                            <div class="mb-4">
                                <label class="form-label">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                    <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100">
                                <i class="fas fa-paper-plane"></i> Send Reset Link
                            </button>
                        </form>

                        <div class="text-center mt-4">
                            <a href="{{ url_for('auth.login') }}" style="color:var(--gray-500); text-decoration:none; font-size:0.9rem;">
                                <i class="fas fa-arrow-left"></i> Back to Sign In
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
