{% extends "base.html" %}
{% block title %}Reset Password - SkillSwap{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="auth-card card border-0">
                    <div class="card-body">
                        <div class="auth-header">
                            <div class="auth-icon" style="background:var(--gradient-5);">
                                <i class="fas fa-lock-open"></i>
                            </div>
                            <h2>Set New Password</h2>
                            <p>Create a strong password for your account</p>
                        </div>

                        <form method="POST" action="{% if token is defined %}{{ url_for('auth.reset_password', token=token) }}{% else %}{{ url_for('auth.reset_password_new') }}{% endif %}">
                            <div class="mb-3">
                                <label class="form-label">New Password</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                    <input type="password" name="password" class="form-control" placeholder="Min 6 characters" required>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Confirm Password</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                    <input type="password" name="confirm_password" class="form-control" placeholder="Confirm new password" required>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100">
                                <i class="fas fa-save"></i> Reset Password
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
