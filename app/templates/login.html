{% extends "base.html" %}
{% block title %}Sign In - SkillSwap{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="auth-card card border-0">
                    <div class="card-body">
                        <div class="auth-header">
                            <div class="auth-icon">
                                <i class="fas fa-sign-in-alt"></i>
                            </div>
                            <h2>Welcome Back</h2>
                            <p>Sign in to continue your journey</p>
                        </div>

                        <form method="POST" action="{{ url_for('auth.login') }}">
                            <div class="mb-3">
                                <label class="form-label">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                    <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
                                </div>
                            </div>

                            <div class="mb-2">
                                <label class="form-label">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                    <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                                </div>
                            </div>

                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <div class="form-check">
                                    <input type="checkbox" name="remember" class="form-check-input" id="remember">
                                    <label class="form-check-label" for="remember" style="font-size:0.9rem; color:var(--gray-600);">Remember me</label>
                                </div>
                                <a href="{{ url_for('auth.forgot_password') }}" style="font-size:0.9rem; color:var(--primary); text-decoration:none; font-weight:600;">Forgot Password?</a>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100">
                                Sign In <i class="fas fa-arrow-right"></i>
                            </button>
                        </form>

                        <div class="auth-divider">or</div>

                        <p class="text-center mb-0" style="color:var(--gray-500); font-size:0.95rem;">
                            Don't have an account?
                            <a href="{{ url_for('auth.register') }}" style="color:var(--primary); font-weight:600; text-decoration:none;">Create Account</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
