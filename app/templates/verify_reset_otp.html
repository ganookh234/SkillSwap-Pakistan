{% extends "base.html" %}
{% block title %}Verify Reset Code - SkillSwap{% endblock %}

{% block extra_css %}
<style>
    .otp-inputs {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin: 30px 0;
    }

    .otp-input {
        width: 55px;
        height: 65px;
        text-align: center;
        font-size: 1.8rem;
        font-weight: 800;
        border: 2px solid var(--gray-200);
        border-radius: var(--radius);
        background: var(--gray-50);
        color: var(--gray-900);
        transition: all 0.3s ease;
        font-family: 'Inter', monospace;
    }

    .otp-input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        background: white;
        outline: none;
    }

    .otp-input.filled {
        border-color: var(--primary);
        background: rgba(79, 70, 229, 0.03);
    }
</style>
{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="auth-card card border-0">
                    <div class="card-body" style="padding:48px 40px;">

                        <div class="auth-header">
                            <div class="auth-icon" style="background:linear-gradient(135deg, #F59E0B, #EF4444);">
                                <i class="fas fa-key"></i>
                            </div>
                            <h2>Enter Reset Code</h2>
                            <p>We sent a code to</p>
                            <p style="color:var(--primary); font-weight:700; font-size:1rem; margin-top:-8px;">
                                {{ user.email }}
                            </p>
                        </div>

                        <form method="POST" action="{{ url_for('auth.verify_reset_otp') }}" id="otpForm">
                            <input type="hidden" name="otp" id="otpHidden">

                            <div class="otp-inputs">
                                <input type="text" maxlength="1" class="otp-input" data-index="0" autofocus>
                                <input type="text" maxlength="1" class="otp-input" data-index="1">
                                <input type="text" maxlength="1" class="otp-input" data-index="2">
                                <input type="text" maxlength="1" class="otp-input" data-index="3">
                                <input type="text" maxlength="1" class="otp-input" data-index="4">
                                <input type="text" maxlength="1" class="otp-input" data-index="5">
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100">
                                <i class="fas fa-check-circle"></i> Verify Code
                            </button>
                        </form>

                        <div class="text-center mt-4">
                            <a href="{{ url_for('auth.forgot_password') }}" style="color:var(--gray-500); text-decoration:none; font-size:0.9rem;">
                                <i class="fas fa-arrow-left"></i> Try Different Email
                            </a>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    var inputs = document.querySelectorAll('.otp-input');
    var hiddenInput = document.getElementById('otpHidden');
    var form = document.getElementById('otpForm');

    inputs.forEach(function(input, index) {
        input.addEventListener('input', function(e) {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
            if (e.target.value && index < inputs.length - 1) {
                inputs[index + 1].focus();
            }
            if (e.target.value) { e.target.classList.add('filled'); }
            else { e.target.classList.remove('filled'); }
            updateHiddenInput();
        });

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Backspace' && !e.target.value && index > 0) {
                inputs[index - 1].focus();
                inputs[index - 1].value = '';
                inputs[index - 1].classList.remove('filled');
            }
        });

        input.addEventListener('paste', function(e) {
            e.preventDefault();
            var pasteData = e.clipboardData.getData('text').replace(/[^0-9]/g, '');
            for (var i = 0; i < pasteData.length && i < inputs.length; i++) {
                inputs[i].value = pasteData[i];
                inputs[i].classList.add('filled');
            }
            updateHiddenInput();
        });
    });

    function updateHiddenInput() {
        var otp = '';
        inputs.forEach(function(input) { otp += input.value; });
        hiddenInput.value = otp;
    }

    form.addEventListener('submit', function(e) {
        updateHiddenInput();
        if (hiddenInput.value.length !== 6) {
            e.preventDefault();
            alert('Please enter all 6 digits!');
        }
    });
});
</script>
{% endblock %}

{% endblock %}
